project_ref: kszdievqesveluzcnzsh

postgrest:
  # Limite maximo de filas que Supabase devuelve en una sola respuesta REST.
  # Subido a 50000 porque algunas vistas (alumnos, registros historicos) superan 1000.
  # El codigo igual usa supaFetchAll para paginar; esto es defensa en profundidad.
  max_rows: 50000
