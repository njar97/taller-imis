<!-- ═══ SESIÓN DE EMPAQUE (beta) ═══ flujo unificado: escuela → marcar
     piezas → confirmar → (entrega). Reemplazará a: selector de combos,
     empacar acaparados y asignar-a-alumnos. Vive fuera del nav (se llega
     por botones de Bodega/Inicio y por Ctrl+K). Motor: empaque.js, que
     reusa empacarAlumnosDesdeRegistro/desempacarPieza de bodega.js. -->
<div id="view-empaque" class="view">
  <div id="empaque-contenido">
    <div class="text-muted" style="padding:20px;text-align:center">Cargando sesión de empaque...</div>
  </div>

  <!-- Modal: 🔒 Reservar tallas — necesidad de la escuela vs bodega, por
       prenda-talla con cantidad editable (pre-llenada con lo que falta) -->
  <div id="emq-reserva-modal" class="modal" style="display:none">
    <div class="modal-content" style="max-width:520px">
      <div class="modal-header">
        <div class="card-title" style="margin:0">🔒 Reservar tallas para la escuela</div>
        <button class="btn btn-ghost btn-sm" onclick="emqCerrarReserva()">✕</button>
      </div>
      <div class="modal-body">
        <div id="emq-reserva-contenido"></div>
      </div>
    </div>
  </div>

  <!-- Mini-modal: elegir talla alterna para una pieza sin stock de la pedida -->
  <div id="emq-alt-modal" class="modal" style="display:none">
    <div class="modal-content" style="max-width:380px">
      <div class="modal-header">
        <div class="card-title" id="emq-alt-titulo" style="margin:0">Talla alterna</div>
        <button class="btn btn-ghost btn-sm" onclick="emqCerrarAlt()">✕</button>
      </div>
      <div class="modal-body">
        <div class="text-muted mb8" style="font-size:12px" id="emq-alt-sub"></div>
        <div id="emq-alt-lista" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
    </div>
  </div>
</div>
