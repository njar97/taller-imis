<!-- ══════════ BODEGA ══════════ -->
<div id="view-bodega" class="view">
  <div id="alert-bodega"></div>
  <div class="card">
    <div class="card-title">📦 Bodega</div>
    <div id="bodega-tabs"></div>
  </div>
  <div id="bodega-contenido"></div>

  <!-- Modal: entrada manual (genérica) -->
  <div id="bodega-entrada-modal" class="modal" style="display:none">
    <div class="modal-content" style="max-width:500px">
      <div class="modal-header">
        <div class="card-title">+ Movimiento de bodega</div>
        <button class="btn btn-ghost btn-sm" onclick="cerrarEntradaManual()">✕</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Tipo</label>
          <select id="ent-tipo">
            <option value="ENTRADA_MANUAL">📥 Entrada manual</option>
            <option value="AJUSTE_INVENTARIO">⚖ Ajuste de inventario</option>
            <option value="DEFECTO">✗ Defecto (devolver a producción)</option>
          </select>
        </div>
        <div class="field">
          <label>Prenda *</label>
          <input type="text" id="ent-prenda" placeholder="Ej: CAMISA, BLUSA, PANTALON, FALDA, SHORT, CAMISA_CELESTE">
        </div>
        <div class="field">
          <label>Talla (key) *</label>
          <input type="text" id="ent-talla" placeholder="Ej: C14, B12, P1075, F1050, CC6">
        </div>
        <div class="field">
          <label>Cantidad *</label>
          <input type="number" id="ent-cantidad" min="1">
        </div>
        <div class="field">
          <label>Observaciones</label>
          <textarea id="ent-obs" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="cerrarEntradaManual()">Cancelar</button>
        <button class="btn btn-success" onclick="guardarEntradaManual()">✓ Registrar</button>
      </div>
    </div>
  </div>

  <!-- Modal: SALIDA A ESCUELA — específico, con selects y stock visible -->
  <div id="bodega-salida-modal" class="modal" style="display:none">
    <div class="modal-content" style="max-width:540px">
      <div class="modal-header">
        <div>
          <div class="card-title" style="margin:0">🚚 Salida a escuela</div>
          <div style="font-size:12px;color:#666;margin-top:2px">Registrar entrega de piezas terminadas. Descuenta del stock.</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="cerrarSalidaModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Escuela *</label>
          <select id="sal-escuela" onchange="onSalidaPrendaTalla()">
            <option value="">— Elegí escuela —</option>
          </select>
        </div>
        <div class="row2">
          <div class="field">
            <label>Prenda *</label>
            <select id="sal-prenda" onchange="onSalidaPrendaCambio()">
              <option value="">— Elegí prenda —</option>
            </select>
          </div>
          <div class="field">
            <label>Talla *</label>
            <select id="sal-talla" onchange="onSalidaPrendaTalla()">
              <option value="">— Elegí talla —</option>
            </select>
          </div>
        </div>
        <div id="sal-stock-info" style="padding:8px 12px;background:#F5F7FA;border-radius:6px;margin-bottom:10px;font-size:13px;display:none">
          Seleccioná prenda y talla
        </div>
        <div class="field">
          <label>Cantidad a entregar *</label>
          <input type="number" id="sal-cantidad" min="1" placeholder="Ej: 25">
        </div>
        <div class="field">
          <label>Observaciones</label>
          <textarea id="sal-obs" rows="2" placeholder="Ej: Lote 1, primera entrega"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="cerrarSalidaModal()">Cancelar</button>
        <button class="btn btn-success" id="sal-btn-guardar" onclick="guardarSalida()">🚚 Registrar salida</button>
      </div>
    </div>
  </div>
</div>
