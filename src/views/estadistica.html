<!-- ═══ ESTADÍSTICA ═══ reportes que cruzan etapas (porteado del RESUMEN/ESTADISTICA del Excel) -->
<div id="view-estadistica" class="view">
  <div id="alert-estadistica"></div>

  <!-- Subnav: 2 filas agrupadas para que entren todos en móvil sin solaparse -->
  <div class="card" style="padding:8px;margin-bottom:10px;display:flex;flex-direction:column;gap:6px">
    <!-- Reportes operativos (día a día) -->
    <div role="group" aria-label="Reportes operativos" style="display:flex;gap:4px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" id="est-sub-escuela"    onclick="switchSubEst('escuela')"    style="flex:1;min-width:72px">🏫 Por escuela</button>
      <button class="btn btn-ghost   btn-sm" id="est-sub-tallas"     onclick="switchSubEst('tallas')"     style="flex:1;min-width:72px">📊 Por talla</button>
      <button class="btn btn-ghost   btn-sm" id="est-sub-heatmap"    onclick="switchSubEst('heatmap')"    style="flex:1;min-width:72px">🔥 Críticas</button>
      <button class="btn btn-ghost   btn-sm" id="est-sub-inventario" onclick="switchSubEst('inventario')" style="flex:1;min-width:72px">📦 Inventario</button>
    </div>
    <!-- Análisis y planificación -->
    <div role="group" aria-label="Análisis y planificación" style="display:flex;gap:4px;flex-wrap:wrap;padding-top:4px;border-top:1px dashed #E0E0E0">
      <button class="btn btn-ghost btn-sm" id="est-sub-historico" onclick="switchSubEst('historico')" style="flex:1;min-width:72px">📈 Histórico</button>
      <button class="btn btn-ghost btn-sm" id="est-sub-costos"    onclick="switchSubEst('costos')"    style="flex:1;min-width:72px">💰 Costos</button>
      <button class="btn btn-ghost btn-sm" id="est-sub-yardaje"   onclick="switchSubEst('yardaje')"   style="flex:1;min-width:72px">📐 Yardaje</button>
      <button class="btn btn-ghost btn-sm" id="est-sub-contratos" onclick="switchSubEst('contratos')" style="flex:1;min-width:72px">📑 Contratos</button>
    </div>
  </div>

  <!-- SUB: Por escuela (RESUMEN del Excel) -->
  <div id="est-sub-escuela-view">
    <div id="resumen-esc-contenido">
      <div class="text-muted" style="padding:20px;text-align:center">Cargando estadística por escuela...</div>
    </div>
  </div>

  <!-- SUB: Por talla — demanda por escuela cruzada con corte/producción/bodega/pool -->
  <div id="est-sub-tallas-view" style="display:none">
    <div id="est-tallas-contenido"><div class="text-muted" style="padding:20px;text-align:center">Cargando resumen por talla...</div></div>
  </div>

  <!-- SUB: Heatmap de tallas críticas -->
  <div id="est-sub-heatmap-view" style="display:none">
    <div id="est-heatmap-contenido"><div class="text-muted" style="padding:20px;text-align:center">Cargando heatmap...</div></div>
  </div>

  <!-- SUB: Histórico -->
  <div id="est-sub-historico-view" style="display:none">
    <div id="historico-contenido"><div class="text-muted" style="padding:20px;text-align:center">Cargando datos históricos...</div></div>
  </div>

  <!-- SUB: Inventario — demanda (alumnos) vs stock (bodega) por prenda × talla -->
  <div id="est-sub-inventario-view" style="display:none">
    <div class="text-muted" style="padding:20px;text-align:center">Cargando inventario...</div>
  </div>

  <!-- SUB: Costos — mano de obra por nivel × sexo, precios del RESUMEN del Excel -->
  <div id="est-sub-costos-view" style="display:none">
    <div class="text-muted" style="padding:20px;text-align:center">Cargando costos...</div>
  </div>

  <!-- SUB: Yardaje — tela necesaria por color, factores del RESUMEN del Excel -->
  <div id="est-sub-yardaje-view" style="display:none">
    <div class="text-muted" style="padding:20px;text-align:center">Cargando yardaje...</div>
  </div>

  <!-- SUB: Contratos — cruce contrato (Excel) vs producido/entregado -->
  <div id="est-sub-contratos-view" style="display:none">
    <div class="text-muted" style="padding:20px;text-align:center">Cargando contratos...</div>
  </div>
</div>
