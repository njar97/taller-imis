<!-- ═══ ESTADÍSTICA ═══ reportes que cruzan etapas (porteado del RESUMEN/ESTADISTICA del Excel) -->
<div id="view-estadistica" class="view">
  <div id="alert-estadistica"></div>

  <!-- Sub-nav reingeniada (v32): solo 2 reportes.
       · 📊 Por talla  — central, abre por defecto (incluye toggle 🔥 Solo críticas).
       · 📋 Por escuela — fusión de Tallaje + Contrato + Tela/Yardaje en un reporte.
       Inventario y Tallas críticas se fusionaron en Por talla.
       Histórico y Costos se movieron a la pestaña Config. -->
  <div class="card" style="padding:8px 10px;margin-bottom:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <button id="est-nav-tallas" class="btn btn-sm btn-primary" onclick="switchSubEst('tallas')">📊 Por talla</button>
    <button id="est-nav-escuela" class="btn btn-sm btn-ghost" onclick="switchSubEst('escuela')">📋 Por escuela</button>
    <button id="est-nav-pronostico" class="btn btn-sm btn-ghost" onclick="switchSubEst('pronostico')">🔮 Pronóstico</button>
  </div>

  <!-- SUB: Por talla — demanda por escuela cruzada con corte/producción/bodega/pool (reporte central) -->
  <div id="est-sub-tallas-view">
    <div id="est-tallas-contenido"><div class="text-muted" style="padding:20px;text-align:center">Cargando resumen por talla...</div></div>
  </div>

  <!-- SUB: Por escuela — Tallaje + Contrato + Tela/Yardaje (unificado, est_escuela.js) -->
  <div id="est-sub-escuela-view" style="display:none">
    <div class="text-muted" style="padding:20px;text-align:center">Cargando reporte por escuela...</div>
  </div>

  <!-- SUB: Pronóstico — distribución histórica × cantidad nueva (pronostico.js) -->
  <div id="est-sub-pronostico-view" style="display:none">
    <div class="text-muted" style="padding:20px;text-align:center">Cargando pronóstico...</div>
  </div>
</div>
